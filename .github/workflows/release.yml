# Build one Android Maven repository from canonical native slices, then publish those exact files.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  prepare:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.provenance.outputs.source_sha }}
      version: ${{ steps.provenance.outputs.version }}
      native_artifact_name: ${{ steps.native-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Mint canonical-source read token
        id: source-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOP_SOURCE_APP_ID }}
          private-key: ${{ secrets.HOP_SOURCE_APP_PRIVATE_KEY }}
          owner: hopmesh
          repositories: monorepo
          permission-actions: read
          permission-attestations: read
          permission-checks: read
          permission-contents: read
      - name: Verify canonical source, tag, tree, CI, and native provenance
        id: provenance
        env:
          SOURCE_TOKEN: ${{ steps.source-token.outputs.token }}
        run: >-
          python3 .github/release-provenance.py
          --component hop-sdk-android
          --require-native-artifacts
          --github-output "$GITHUB_OUTPUT"
      - name: Download canonical native bundle by run and artifact ID
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: >-
          python3 native/native-artifacts.py download-github
          --run-id '${{ steps.provenance.outputs.native_run_id }}'
          --run-attempt '${{ steps.provenance.outputs.native_run_attempt }}'
          --source-sha '${{ steps.provenance.outputs.source_sha }}'
          --output "$RUNNER_TEMP/native-release"
      - name: Verify signed Android inputs and canonical attestations
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: |
          python3 native/native-artifacts.py verify-provenance \
            --manifest "$RUNNER_TEMP/native-release/native-artifacts.json" \
            --signature "$RUNNER_TEMP/native-release/native-artifacts.json.sig" \
            --public-key native/native-artifacts-public.pem \
            --directory "$RUNNER_TEMP/native-release" \
            --provenance-bundle "$RUNNER_TEMP/native-release/native-artifacts.provenance.sigstore.json" \
            --source-sha '${{ steps.provenance.outputs.source_sha }}' \
            --tag "$GITHUB_REF_NAME" --run-id '${{ steps.provenance.outputs.native_run_id }}' \
            --run-attempt '${{ steps.provenance.outputs.native_run_attempt }}'
      - name: Bind native input artifact identity
        id: native-artifact
        run: echo "name=native-input-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.native-artifact.outputs.name }}
          path: ${{ runner.temp }}/native-release/*
          if-no-files-found: error
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_artifact_name: ${{ steps.release-artifact.outputs.name }}
      release_artifact_attempt: ${{ steps.release-artifact.outputs.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.native_artifact_name }}
          path: ${{ runner.temp }}/native-release
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17.0.19+10
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: '9.5.1'
      - name: Build and validate the exact Maven publication
        run: |
          set -euo pipefail
          declared="$(python3 -c 'import re; print(re.search(r"^version = \"([^\"]+)\"$", open("build.gradle.kts").read(), re.M).group(1))')"
          test "v$declared" = "$GITHUB_REF_NAME"
          work="$RUNNER_TEMP/android-package-validation"
          mkdir "$work"
          python3 .github/package-export-smoke.py validate-android-export \
            --export . --work-root "$work" --native-bundle "$RUNNER_TEMP/native-release"
          release="$RUNNER_TEMP/release"
          mkdir "$release"
          cp -R "$work/hop-sdk-android-validation/android-maven" "$release/maven"
          cp "$RUNNER_TEMP/native-release/native-artifacts.json" "$release/"
          cp "$RUNNER_TEMP/native-release/native-artifacts.json.sig" "$release/"
          cp "$RUNNER_TEMP/native-release/native-artifacts.provenance.sigstore.json" "$release/"
          python3 .github/release-artifact.py create --directory "$release" \
            --canonical-source-sha '${{ needs.prepare.outputs.source_sha }}'
      - name: Bind release artifact identity
        id: release-artifact
        run: |
          echo "name=release-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.release-artifact.outputs.name }}
          path: ${{ runner.temp }}/release/
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.release_artifact_name }}
          path: ${{ runner.temp }}/release
      - name: Verify immutable Maven repository
        run: >-
          python3 .github/release-artifact.py verify --directory "$RUNNER_TEMP/release"
          --canonical-source-sha '${{ needs.prepare.outputs.source_sha }}'
          --run-attempt '${{ needs.build.outputs.release_artifact_attempt }}'
      - name: Attest verified Android AAR
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/release/maven/sh/hop/hop/${{ needs.prepare.outputs.version }}/hop-${{ needs.prepare.outputs.version }}.aar
      - name: Sign and publish copies of verified Maven files
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_GPG_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          test -n "$MAVEN_USERNAME"
          test -n "$MAVEN_PASSWORD"
          test -n "$MAVEN_SIGNING_KEY"
          test -n "$MAVEN_SIGNING_PASSWORD"
          cp -R "$RUNNER_TEMP/release/maven" "$RUNNER_TEMP/publish-maven"
          printf '%s\n' "$MAVEN_SIGNING_KEY" | gpg --batch --import
          python3 - "$RUNNER_TEMP/publish-maven" <<'PY'
          import base64
          import hashlib
          import os
          from pathlib import Path
          import subprocess
          import sys
          import urllib.parse
          import urllib.request

          root = Path(sys.argv[1])
          primary = [
              path for path in sorted(root.rglob("*"))
              if path.is_file() and not path.name.endswith((".sha256", ".sha512", ".asc"))
          ]
          for path in primary:
              subprocess.run(
                  ["gpg", "--batch", "--yes", "--pinentry-mode", "loopback",
                   "--passphrase", os.environ["MAVEN_SIGNING_PASSWORD"],
                   "--armor", "--detach-sign", str(path)],
                  check=True,
              )
          for path in [item for item in sorted(root.rglob("*")) if item.is_file() and not item.name.endswith((".sha256", ".sha512"))]:
              payload = path.read_bytes()
              path.with_name(path.name + ".sha256").write_text(hashlib.sha256(payload).hexdigest() + "\n")
              path.with_name(path.name + ".sha512").write_text(hashlib.sha512(payload).hexdigest() + "\n")

          endpoint = "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/"
          credential = base64.b64encode(
              f"{os.environ['MAVEN_USERNAME']}:{os.environ['MAVEN_PASSWORD']}".encode()
          ).decode()
          for path in sorted(item for item in root.rglob("*") if item.is_file()):
              relative = path.relative_to(root).as_posix()
              url = endpoint + "/".join(urllib.parse.quote(part) for part in relative.split("/"))
              request = urllib.request.Request(
                  url,
                  data=path.read_bytes(),
                  method="PUT",
                  headers={"Authorization": f"Basic {credential}"},
              )
              with urllib.request.urlopen(request, timeout=120) as response:
                  if response.status not in (200, 201, 204):
                      raise SystemExit(f"Maven upload failed for {relative}: HTTP {response.status}")
              print(f"uploaded Maven file: {relative}")

          finalize = urllib.request.Request(
              "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/sh.hop?publishing_type=automatic",
              data=b"",
              method="POST",
              headers={"Authorization": f"Bearer {credential}"},
          )
          with urllib.request.urlopen(finalize, timeout=120) as response:
              if response.status not in (200, 201, 202, 204):
                  raise SystemExit(f"Maven deployment finalization failed: HTTP {response.status}")
              deployment = response.read().decode("utf-8", "replace").strip()
          print(f"submitted Maven deployment: {deployment or 'accepted'}")
          PY
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            ${{ runner.temp }}/release/maven/sh/hop/hop/${{ needs.prepare.outputs.version }}/hop-${{ needs.prepare.outputs.version }}.aar
            ${{ runner.temp }}/release/maven/sh/hop/hop/${{ needs.prepare.outputs.version }}/hop-${{ needs.prepare.outputs.version }}.aar.sha256
            ${{ runner.temp }}/release/maven/sh/hop/hop/${{ needs.prepare.outputs.version }}/hop-${{ needs.prepare.outputs.version }}-sources.jar
            ${{ runner.temp }}/release/maven/sh/hop/hop/${{ needs.prepare.outputs.version }}/hop-${{ needs.prepare.outputs.version }}-javadoc.jar
            ${{ runner.temp }}/release/maven/sh/hop/hop/${{ needs.prepare.outputs.version }}/hop-${{ needs.prepare.outputs.version }}.pom
            ${{ runner.temp }}/release/native-artifacts.json
            ${{ runner.temp }}/release/native-artifacts.json.sig
            ${{ runner.temp }}/release/native-artifacts.provenance.sigstore.json
            ${{ runner.temp }}/release/release-manifest.json
